<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile - FAIR Assessment Tool</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .fixed-check {
            background: #f1f3f4;
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 0.35rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .fixed-check .lock { color: #999; font-size: 0.75rem; }
        .warning-box {
            background: #fef7e0;
            border: 1px solid #f4b400;
            border-radius: 6px;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            color: #856404;
            margin-bottom: 1rem;
            display: none;
        }
        .item-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.35rem;
            font-size: 0.875rem;
            padding: 0.35rem 0.5rem;
            border-radius: 4px;
            background: #f8f9fa;
        }
        .item-row input[type="checkbox"] {
            width: auto;
            margin: 0;
        }
        .item-row .item-label { flex: 1; }
        .item-row .remove-btn {
            background: none; border: none;
            color: #d93025; cursor: pointer;
            font-size: 1rem; padding: 0 4px;
            line-height: 1;
        }
        .modal-backdrop {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-backdrop.show { display: flex; }
        .modal-box {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            width: 420px;
        }
        .modal-box h3 { margin-bottom: 1rem; font-size: 1rem; }
        .modal-box label {
            display: block;
            font-size: 0.875rem;
            margin-bottom: 0.25rem;
            color: #444;
        }
        .section-title {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #1a73e8;
            margin: 1.25rem 0 0.75rem;
            padding-bottom: 0.35rem;
            border-bottom: 1px solid #e8f0fe;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <h1>FAIR Assessment Tool</h1>
    <a href="index.html">Profiles</a>
    <a href="assess.html">Assess</a>
    <a href="history.html">History</a>
</nav>

<div class="container">
    <div class="card">
        <h2 id="profile-title">Edit Profile</h2>
<p style="font-size:0.8rem;color:#666;margin-bottom:1rem">

</p>

        <div id="message-area"></div>
        <div class="warning-box" id="warning-box"></div>

        <div class="section-title">Findable — Identifier Requirements</div>

        <div class="checkbox-group">
            <label style="font-size:0.875rem;color:#444;margin-bottom:0.5rem;display:block">
                Accepted persistent identifier types:
            </label>

            <div id="identifier-list"></div>
            <button type="button" class="add-link"
                onclick="openModal('identifier')">+ Add Identifier Type</button>
        </div>

        <div class="section-title">Findable / Interoperable — Metadata Fields</div>
        <div class="checkbox-group">
            <label style="font-size:0.875rem;color:#444;margin-bottom:0.5rem;display:block">
                Required metadata fields:
            </label>
            <div id="metadata-list"></div>
            <button type="button" class="add-link"
                onclick="openModal('metadata')">+ Add Metadata Field</button>
        </div>

        <div class="section-title">Interoperable — File Formats</div>
        <div class="checkbox-group">
            <label style="font-size:0.875rem;color:#444;margin-bottom:0.5rem;display:block">
                Accepted file formats:
            </label>
            <div id="format-list"></div>
            <button type="button" class="add-link"
                onclick="openModal('format')">+ Add Format</button>
        </div>

        <div class="section-title">Interoperable — Vocabulary</div>
        <div class="checkbox-group">
            <label style="font-size:0.875rem;color:#444;margin-bottom:0.5rem;display:block">
                Required controlled vocabulary:
            </label>
            
            <input type="text" id="vocabulary-input"
                placeholder="e.g. AGROVOC, MeSH, ENVO (leave empty if none required)"
                style="margin-top:0.5rem">
        </div>

        <div class="section-title">Reusable — License</div>
        <div class="checkbox-group">
            <label style="font-size:0.875rem;color:#444;margin-bottom:0.5rem;display:block">
                Required license:
            </label>
            <div class="fixed-check">

            <input type="text" id="license-input"
                placeholder="e.g. CC-BY (leave empty to accept any license)"
                style="margin-top:0.5rem">
        </div>

        <div style="display:flex;gap:0.75rem;margin-top:1.5rem;flex-wrap:wrap">
    <button type="button" class="btn btn-primary"
        onclick="saveProfile()">Save Profile</button>
    <button type="button" class="btn btn-secondary"
        onclick="window.location.href='index.html'">Cancel</button>
    <button type="button" class="btn btn-secondary"
        onclick="restoreProfile()"
        style="margin-left:auto;border-color:#f4b400;color:#856404">
        ↺ Restore to Default
    </button>
</div>
    </div>
</div>

<div class="modal-backdrop" id="add-modal">
    <div class="modal-box">
        <h3 id="modal-title">Add Item</h3>
        <label>Name:</label>
        <input type="text" id="modal-name" placeholder="e.g. ARK, NetCDF, crop_type">
        <label style="margin-top:0.5rem">Match condition:</label>
        <select id="modal-match" style="margin-bottom:0.75rem">
            <option value="starts_with">Starts with</option>
            <option value="contains">Contains</option>
            <option value="exact">Exact match</option>
        </select>
        <label>Value (for identifiers/formats):</label>
        <input type="text" id="modal-value"
            placeholder="e.g. ark: (optional for metadata fields)">
        <label style="margin-top:0.5rem">Description (optional):</label>
        <input type="text" id="modal-desc"
            placeholder="Brief description of this requirement">
        <div style="display:flex;gap:0.75rem;margin-top:1rem;justify-content:flex-end">
            <button type="button" class="btn btn-secondary"
                onclick="closeModal()">Cancel</button>
            <button type="button" class="btn btn-primary"
                onclick="saveModalItem()">Add</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
let profile = JSON.parse(localStorage.getItem('selectedProfile') || '{}');
let currentModalType = null;

// load saved full state if exists (preserves unchecked items)
const savedFullState = JSON.parse(
    localStorage.getItem('profileFullState_' + profile.name) || 'null'
);

// ALL items ever seen — use saved full state if available
let allIdentifiers = savedFullState
    ? savedFullState.all_identifiers
    : [...(profile.accepted_identifiers || [])];
let allFormats = savedFullState
    ? savedFullState.all_formats
    : [...(profile.accepted_formats || [])];
let allMetadata = savedFullState
    ? savedFullState.all_metadata
    : [...(profile.required_metadata_fields || [])];

// active = what the profile currently has checked
let activeIdentifiers = [...(profile.accepted_identifiers || [])];
let activeFormats = [...(profile.accepted_formats || [])];
let activeMetadata = [...(profile.required_metadata_fields || [])];

// baseline = original profile items, never get × button
const baselineIdentifiers = savedFullState
    ? savedFullState.all_identifiers.filter(i =>
        profile.accepted_identifiers?.includes(i) ||
        allIdentifiers.includes(i))
    : [...(profile.accepted_identifiers || [])];
const baselineFormats = savedFullState
    ? savedFullState.all_formats
    : [...(profile.accepted_formats || [])];
const baselineMetadata = savedFullState
    ? savedFullState.all_metadata
    : [...(profile.required_metadata_fields || [])];

function renderList(allItems, activeItems, baselineItems, containerId, type) {
    const container = document.getElementById(containerId);
    if (allItems.length === 0) {
        container.innerHTML =
            '<div style="font-size:0.8rem;color:#999;padding:0.25rem 0">' +
            'No items — click + Add below</div>';
        return;
    }
    container.innerHTML = allItems.map(item => {
        const checked = activeItems.includes(item);
        const isBaseline = baselineItems.includes(item);
        return `
            <div class="item-row">
                <input type="checkbox" ${checked ? 'checked' : ''}
                    onchange="toggleItem('${type}', '${item}', this.checked)">
                <span class="item-label"
                    style="${!checked
                        ? 'color:#aaa;text-decoration:line-through;'
                        : ''}">
                    ${item}
                </span>
                ${isBaseline
                    ? '<span style="font-size:0.7rem;color:#bbb;margin-left:4px">baseline</span>'
                    : `<button type="button" class="remove-btn"
                        onclick="removeCustomItem('${type}', '${item}')">×</button>`
                }
            </div>
        `;
    }).join('');
}

async function restoreProfile() {
    if (!confirm(
        'Restore "' + profile.name + '" to its original default settings? ' +
        'All your changes will be lost.'
    )) return;

    try {
        const restored = await apiFetch(
            '/profiles/' + encodeURIComponent(profile.name) + '/restore',
            { method: 'POST' }
        );

        // clear saved full state so we start fresh from defaults
        localStorage.removeItem('profileFullState_' + profile.name);

        allIdentifiers = [...restored.accepted_identifiers];
        allFormats = [...restored.accepted_formats];
        allMetadata = [...restored.required_metadata_fields];
        activeIdentifiers = [...restored.accepted_identifiers];
        activeFormats = [...restored.accepted_formats];
        activeMetadata = [...restored.required_metadata_fields];

        document.getElementById('vocabulary-input').value =
            restored.required_vocabulary || '';
        document.getElementById('license-input').value =
            restored.required_license || '';

        localStorage.setItem('selectedProfile',
            JSON.stringify({...profile, ...restored}));

        renderAll();
        validateProfile();
        showSuccess('message-area', 'Profile restored to default settings.');
    } catch(e) {
        showError('message-area', 'Restore failed: ' + e.message);
    }
}

function renderAll() {
    renderList(allIdentifiers, activeIdentifiers, baselineIdentifiers,
        'identifier-list', 'identifier');
    renderList(allFormats, activeFormats, baselineFormats,
        'format-list', 'format');
    renderList(allMetadata, activeMetadata, baselineMetadata,
        'metadata-list', 'metadata');
}

function toggleItem(type, value, checked) {
    if (type === 'identifier') {
        if (checked) {
            if (!activeIdentifiers.includes(value)) activeIdentifiers.push(value);
        } else {
            activeIdentifiers = activeIdentifiers.filter(i => i !== value);
        }
    }
    if (type === 'format') {
        if (checked) {
            if (!activeFormats.includes(value)) activeFormats.push(value);
        } else {
            activeFormats = activeFormats.filter(f => f !== value);
        }
    }
    if (type === 'metadata') {
        if (checked) {
            if (!activeMetadata.includes(value)) activeMetadata.push(value);
        } else {
            activeMetadata = activeMetadata.filter(m => m !== value);
        }
    }
    renderAll();
    validateProfile();
}

// Only custom (non-baseline) items can be fully removed
function removeCustomItem(type, value) {
    if (type === 'identifier') {
        allIdentifiers = allIdentifiers.filter(i => i !== value);
        activeIdentifiers = activeIdentifiers.filter(i => i !== value);
    }
    if (type === 'format') {
        allFormats = allFormats.filter(f => f !== value);
        activeFormats = activeFormats.filter(f => f !== value);
    }
    if (type === 'metadata') {
        allMetadata = allMetadata.filter(m => m !== value);
        activeMetadata = activeMetadata.filter(m => m !== value);
    }
    renderAll();
    validateProfile();
}

function validateProfile() {
    const warnings = [];
    if (activeIdentifiers.length === 0)
        warnings.push('No identifier types active — F1 check will always fail.');
    if (activeMetadata.length === 0)
        warnings.push('No metadata fields required — F2 check will pass trivially.');
    if (activeFormats.length === 0)
        warnings.push('No file formats specified — I1 and R1.3 checks will always fail.');

    const box = document.getElementById('warning-box');
    if (warnings.length > 0) {
        box.style.display = 'block';
        box.innerHTML = '⚠️ Configuration warnings:<br>' +
            warnings.map(w => '· ' + w).join('<br>');
    } else {
        box.style.display = 'none';
    }
}

function openModal(type) {
    currentModalType = type;
    const titles = {
        identifier: 'Add Identifier Type',
        format: 'Add File Format',
        metadata: 'Add Metadata Field'
    };
    document.getElementById('modal-title').textContent = titles[type];
    document.getElementById('modal-name').value = '';
    document.getElementById('modal-value').value = '';
    document.getElementById('modal-desc').value = '';
    document.getElementById('add-modal').classList.add('show');
    document.getElementById('modal-name').focus();
}

function closeModal() {
    document.getElementById('add-modal').classList.remove('show');
}

function saveModalItem() {
    const name = document.getElementById('modal-name').value.trim().toLowerCase();
    if (!name) { alert('Please enter a name'); return; }

    if (currentModalType === 'identifier') {
        if (!allIdentifiers.includes(name)) allIdentifiers.push(name);
        if (!activeIdentifiers.includes(name)) activeIdentifiers.push(name);
    }
    if (currentModalType === 'format') {
        if (!allFormats.includes(name)) allFormats.push(name);
        if (!activeFormats.includes(name)) activeFormats.push(name);
    }
    if (currentModalType === 'metadata') {
        if (!allMetadata.includes(name)) allMetadata.push(name);
        if (!activeMetadata.includes(name)) activeMetadata.push(name);
    }

    closeModal();
    renderAll();
    validateProfile();
}

document.getElementById('modal-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveModalItem();
    if (e.key === 'Escape') closeModal();
});

async function saveProfile() {
    validateProfile();
    try {
        const updated = {
            accepted_identifiers: activeIdentifiers,
            accepted_formats: activeFormats,
            required_metadata_fields: activeMetadata,
            required_vocabulary:
                document.getElementById('vocabulary-input').value.trim() || null,
            required_license:
                document.getElementById('license-input').value.trim() || null,
        };

        // save full lists separately so unchecked items persist in the UI
        const fullState = {
            all_identifiers: allIdentifiers,
            all_formats: allFormats,
            all_metadata: allMetadata,
        };
        localStorage.setItem('profileFullState_' + profile.name,
            JSON.stringify(fullState));

        await apiFetch('/profiles/' + encodeURIComponent(profile.name), {
            method: 'PUT',
            body: JSON.stringify(updated)
        });
        localStorage.setItem('selectedProfile',
            JSON.stringify({...profile, ...updated}));
        showSuccess('message-area', 'Profile saved successfully.');
        setTimeout(() => window.location.href = 'index.html', 1000);
    } catch(e) {
        showError('message-area', 'Failed to save: ' + e.message);
    }
}

document.getElementById('profile-title').textContent =
    'Edit Profile: ' + (profile.name || '');
document.getElementById('vocabulary-input').value =
    profile.required_vocabulary || '';
document.getElementById('license-input').value =
    profile.required_license || '';
renderAll();
validateProfile();
</script>
