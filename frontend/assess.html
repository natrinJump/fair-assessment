<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assess - FAIR Assessment Tool</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        .input-row {
            display: flex;
            gap: 0.75rem;
        }
        .input-row input[type="text"] {
            flex: 1;
            min-width: 0;
            margin-bottom: 0;
            padding: 0.6rem 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .input-row select {
            width: 220px;
            margin-bottom: 0;
            padding: 0.6rem 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <h1>FAIR Assessment Tool</h1>
    <a href="index.html">Profiles</a>
    <a href="assess.html">Assess</a>
    <a href="compare.html">Compare</a>
    <a href="history.html">History</a>
    <a href="about.html">About</a>
</nav>

<div class="container">
    <div class="card">
        <h2>Run Assessment</h2>
        <div class="input-group">
    <div class="input-row">
        <input type="text" id="doi-input" list="doi-suggestions"
            placeholder="Enter DOI, Handle, or URL — e.g. 10.5281/zenodo.3490058">
        <datalist id="doi-suggestions"></datalist>
        <select id="profile-select"></select>
        <button type="button" class="btn btn-primary"
            onclick="runAssessment()">Run Assessment</button>
    </div>
</div>
        <div id="message-area"></div>
    </div>

    <div id="results-container" style="display:none">
        <div class="card">
            <h2>FAIR Evaluation Results</h2>
            <p style="font-size:0.875rem;color:#666;margin-bottom:1rem"
                id="result-doi"></p>

            <div class="score-overview">
                <div class="score-card overall">
                    <div class="label">Overall</div>
                    <div class="value" id="score-overall">-</div>
                </div>
                <div class="score-card f">
                    <div class="label">Findable</div>
                    <div class="value" id="score-f">-</div>
                </div>
                <div class="score-card a">
                    <div class="label">Accessible</div>
                    <div class="value" id="score-a">-</div>
                </div>
                <div class="score-card i">
                    <div class="label">Interoperable</div>
                    <div class="value" id="score-i">-</div>
                </div>
                <div class="score-card r">
                    <div class="label">Reusable</div>
                    <div class="value" id="score-r">-</div>
                </div>
            </div>

            <div id="maturity-box" style="display:none;margin-bottom:1rem;padding:0.75rem 1rem;border-radius:6px;border-left:4px solid #1a73e8;background:#f0f7ff">
    <div style="font-size:0.8rem;color:#666;margin-bottom:2px">Maturity Level</div>
    <div id="maturity-level" style="font-size:1rem;font-weight:700;color:#1a73e8"></div>
    <div id="maturity-desc" style="font-size:0.8rem;color:#555;margin-top:4px"></div>
</div>

<h3 style="font-size:0.9rem;font-weight:600;margin-bottom:0.75rem">
    Details:
</h3>
<div id="metric-results"></div>


            <hr class="section-divider">
            <h3 style="font-size:0.9rem;font-weight:600;margin-bottom:0.75rem">
                Recommendations:
            </h3>
            <div id="recommendations"></div>

            <div style="display:flex;gap:0.75rem;margin-top:1rem">
                <button type="button" class="btn btn-secondary"
                    onclick="downloadReport()">Download Report</button>
                <button type="button" class="btn btn-primary"
                    onclick="runAssessment()">Re-run Assessment</button>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
let lastReport = null;

async function loadProfiles() {
    try {
        const profiles = await apiFetch('/profiles');
        const options = profiles.map(p =>
            `<option value="${p.domain}">${p.name}</option>`
        ).join('');
        document.getElementById('profile-select').innerHTML = options;
        const fileSelect = document.getElementById('profile-select-file');
        if (fileSelect) fileSelect.innerHTML = options;
        const saved = JSON.parse(
            localStorage.getItem('selectedProfile') || '{}');
        if (saved.domain) {
            document.getElementById('profile-select').value = saved.domain;
            if (fileSelect) fileSelect.value = saved.domain;
        }
    } catch(e) {
        console.error('Could not load profiles', e);
    }
}

async function loadPreviousDOIs() {
    try {
        const history = getLocalHistory();
        const dois = [...new Set(history.map(h => h.doi))];
        const datalist = document.getElementById('doi-suggestions');
        datalist.innerHTML = dois.map(doi =>
            `<option value="${doi}">`
        ).join('');
    } catch(e) {}
}

async function runAssessment() {
    const doi = document.getElementById('doi-input').value.trim();
    const profile = document.getElementById('profile-select').value;

    if (!doi) {
        showError('message-area', 'Please enter a DOI, Handle, or URL');
        return;
    }

    document.getElementById('message-area').innerHTML =
        '<div class="loading">Running assessment...</div>';
    document.getElementById('results-container').style.display = 'none';

    try {
        const report = await apiFetch(
            `/assess/${doi}?profile=${encodeURIComponent(profile)}`
        );
        lastReport = report;

        // get profile snapshot for history
        const profiles = await apiFetch('/profiles');
        const profileData = profiles.find(p => p.domain === profile);

        // save to localStorage
        addToLocalHistory(report, profileData || {});

        document.getElementById('message-area').innerHTML = '';
        renderReport(report);
        loadPreviousDOIs();
    } catch(e) {
        showError('message-area', 'Assessment failed: ' + e.message);
    }
}

function renderReport(report) {
    document.getElementById('results-container').style.display = 'block';
    document.getElementById('result-doi').textContent =
        'Dataset: ' + report.doi + ' | Profile: ' + report.profile_name;

    document.getElementById('score-overall').textContent =
        formatScore(report.overall_score);
    document.getElementById('score-f').textContent =
        formatScore(report.f_score);
    document.getElementById('score-a').textContent =
        formatScore(report.a_score);
    document.getElementById('score-i').textContent =
        formatScore(report.i_score);
    document.getElementById('score-r').textContent =
        formatScore(report.r_score);

    if (report.maturity_level) {
        const colors = {
            'Advanced': '#0f9d58', 'Intermediate': '#1a73e8',
            'Initial': '#f4b400', 'Incomplete': '#9e9e9e'
        };
        const backgrounds = {
            'Advanced': '#e6f4ea', 'Intermediate': '#e8f0fe',
            'Initial': '#fef7e0', 'Incomplete': '#f5f5f5'
        };
        const box = document.getElementById('maturity-box');
        const level = document.getElementById('maturity-level');
        const desc = document.getElementById('maturity-desc');
        box.style.display = 'block';
        box.style.borderLeftColor = colors[report.maturity_level] || '#1a73e8';
        box.style.background = backgrounds[report.maturity_level] || '#f0f7ff';
        level.textContent = report.maturity_level;
        level.style.color = colors[report.maturity_level] || '#1a73e8';
        desc.textContent = report.maturity_description;
    }

    document.getElementById('metric-results').innerHTML =
        report.results.map(r => `
            <div class="metric-result ${r.status}">
                <div class="metric-header">
                    <span class="metric-id">${r.metric_id}</span>
                    <span class="metric-desc">${r.description}</span>
                    <span class="badge ${r.status}">${r.status}</span>
                    <span class="badge ${r.priority}">${r.priority}</span>
                </div>
                ${r.evidence
                    ? `<div class="metric-evidence">✓ ${r.evidence}</div>`
                    : ''}
                ${r.recommendation
                    ? `<div class="metric-recommendation">
                        → ${r.recommendation}</div>`
                    : ''}
            </div>
        `).join('');

    const recs = report.results.filter(r => r.recommendation);
    const recContainer = document.getElementById('recommendations');
    if (recs.length === 0) {
        recContainer.innerHTML =
            '<p style="font-size:0.875rem;color:#0f9d58">' +
            'No recommendations — dataset meets all profile criteria.</p>';
    } else {
        recContainer.innerHTML = recs.map(r =>
            `<div style="font-size:0.875rem;margin-bottom:0.5rem;
                padding:0.5rem;background:#fafafa;border-radius:4px;
                border-left:3px solid #db4437">
                <strong>${r.metric_id}:</strong> ${r.recommendation}
            </div>`
        ).join('');
    }
}

function downloadReport() {
    if (!lastReport) return;
    const blob = new Blob(
        [JSON.stringify(lastReport, null, 2)],
        { type: 'application/json' }
    );
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'fair-report-' +
        lastReport.doi.replace(/\//g, '-') + '.json';
    a.click();
}

// prefill DOI if coming from history page
const prefill = localStorage.getItem('prefillDoi');
if (prefill) {
    document.getElementById('doi-input').value = prefill;
    localStorage.removeItem('prefillDoi');
}

loadProfiles();
loadPreviousDOIs();
</script>
</body>
</html>
