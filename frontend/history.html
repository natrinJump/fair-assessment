<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>History - FAIR Assessment Tool</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        .run-item { border: 1px solid #e0e0e0; border-radius: 6px; margin-bottom: 0.75rem; overflow: hidden; }
        .run-header { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1rem; cursor: pointer; background: white; transition: background 0.15s; }
        .run-header:hover { background: #f8f9fa; }
        .run-header.expanded { background: #e8f0fe; }
        .run-score { font-size: 1.2rem; font-weight: 700; color: #1a73e8; }
        .run-actions { display: flex; gap: 0.5rem; align-items: center; }
        .btn-sm { padding: 0.3rem 0.75rem; font-size: 0.8rem; border-radius: 4px; border: none; cursor: pointer; font-weight: 500; }
        .btn-sm-secondary { background: white; color: #1a73e8; border: 1px solid #1a73e8; }
        .btn-sm-secondary:hover { background: #e8f0fe; }
        .btn-sm-danger { background: white; color: #d93025; border: 1px solid #d93025; }
        .btn-sm-danger:hover { background: #fce8e6; }
        .btn-sm-fip { background: white; color: #0f9d58; border: 1px solid #0f9d58; }
        .btn-sm-fip:hover { background: #e6f4ea; }
        .run-details { display: none; padding: 1rem; border-top: 1px solid #e0e0e0; background: #fafafa; }
        .run-details.show { display: block; }
        .mini-scores { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
        .mini-score { text-align: center; padding: 0.5rem; border-radius: 6px; background: white; border: 1px solid #e0e0e0; }
        .mini-score .label { font-size: 0.7rem; color: #666; }
        .mini-score .value { font-size: 1rem; font-weight: 700; }
        .mini-score.overall .value { color: #1a73e8; }
        .mini-score.f .value { color: #0f9d58; }
        .mini-score.a .value { color: #f4b400; }
        .mini-score.i .value { color: #db4437; }
        .mini-score.r .value { color: #9c27b0; }
        .metric-mini { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0; font-size: 0.8rem; border-bottom: 1px solid #f0f0f0; }
        .metric-mini:last-child { border-bottom: none; }
        .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .dot.pass { background: #0f9d58; }
        .dot.partial { background: #f4b400; }
        .dot.fail { background: #db4437; }
        .metric-mini .mid-text { flex: 1; color: #444; }
        .metric-mini .rec { font-size: 0.75rem; color: #d93025; margin-top: 0.2rem; }
    </style>
</head>
<body>

<nav class="navbar">
    <h1>FAIR Assessment Tool</h1>
    <a href="index.html">Profiles</a>
    <a href="assess.html">Assess</a>
    <a href="history.html">History</a>
    <a href="about.html">About</a>
</nav>

<div class="container">
    <div class="card no-print">
        <h2>Assessment History</h2>
        <div style="display:flex;gap:0.75rem;align-items:center">
            <input type="text" id="doi-filter"
                placeholder="Filter by DOI (leave empty to see all)"
                style="flex:1;margin-bottom:0">
            <button type="button" class="btn btn-primary"
                onclick="loadHistory()">Search</button>
        </div>
    </div>
    <div id="history-container">
        <div class="loading">Loading history...</div>
    </div>
</div>

<script src="app.js"></script>
<script>
var allHistory = [];
var expandedRunId = null;
var groupedData = {};

function getMaturityColor(level) {
    if (level === 'Advanced') return '#0f9d58';
    if (level === 'Intermediate') return '#1a73e8';
    if (level === 'Initial') return '#f4b400';
    return '#9e9e9e';
}

function getMaturityBg(level) {
    if (level === 'Advanced') return '#e6f4ea';
    if (level === 'Intermediate') return '#e8f0fe';
    if (level === 'Initial') return '#fef7e0';
    return '#f5f5f5';
}

async function loadHistory() {
    var doi = document.getElementById('doi-filter').value.trim();
    var container = document.getElementById('history-container');
    container.innerHTML = '<div class="loading">Loading...</div>';

    try {
        var path = doi ? '/history/' + encodeURIComponent(doi) : '/history';
        allHistory = await apiFetch(path);

        if (!allHistory.length) {
            container.innerHTML = '<div class="card">No assessments found.</div>';
            return;
        }

        groupedData = {};
        allHistory.forEach(function(h) {
            if (!groupedData[h.doi]) groupedData[h.doi] = [];
            groupedData[h.doi].push(h);
        });

        var html = '';
        Object.keys(groupedData).forEach(function(doi) {
            var runs = groupedData[doi];
            var safeId = doi.replace(/[^a-z0-9]/gi, '_');

            html += '<div class="card">';
            html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">';
            html += '<h2 style="font-size:0.9rem;margin:0">' + doi + '</h2>';
            html += '<div style="display:flex;gap:0.5rem">';
            html += '<button type="button" class="btn-sm btn-sm-secondary no-print" onclick="exportAllJSON(\'' + doi.replace(/'/g, "\\'") + '\')">Export all JSON</button>';
            html += '<button type="button" class="btn-sm btn-sm-secondary no-print" onclick="runNew(\'' + doi.replace(/'/g, "\\'") + '\')">Run New Assessment</button>';
            html += '</div></div>';

            if (runs.length > 1) {
                html += '<div style="margin-bottom:1rem;padding:0.5rem;background:#fafafa;border-radius:6px">';
                html += '<canvas id="chart-' + safeId + '" height="80"></canvas>';
                html += '</div>';
            }

            runs.forEach(function(run, i) {
                var prev = runs[i + 1];
                var trend = prev
                    ? (run.overall_score > prev.overall_score
                        ? '<span class="history-trend up">&#8593; improved</span>'
                        : run.overall_score < prev.overall_score
                            ? '<span class="history-trend down">&#8595; dropped</span>'
                            : '<span class="history-trend">&#8594; no change</span>')
                    : '<span style="font-size:0.75rem;color:#999">initial run</span>';

                var maturityHtml = '';
                if (run.maturity_level) {
                    maturityHtml = '<div style="font-size:0.7rem;font-weight:600;color:' +
                        getMaturityColor(run.maturity_level) + '">' + run.maturity_level + '</div>';
                }

                html += '<div class="run-item" id="run-item-' + run.id + '">';
                html += '<div class="run-header" id="run-header-' + run.id + '" onclick="toggleRun(' + run.id + ')">';
                html += '<div>';
                html += '<div style="font-size:0.875rem;font-weight:500">Run ' + (runs.length - i) + ' &mdash; ' + run.profile_name + '</div>';
                html += '<div style="font-size:0.75rem;color:#666;margin-top:2px">' + formatDate(run.created_at) + '</div>';
                html += '<div style="margin-top:4px">' + trend + '</div>';
                html += '</div>';
                html += '<div style="display:flex;align-items:center;gap:1rem">';
                html += '<div style="text-align:right">';
                html += '<div class="run-score">' + formatScore(run.overall_score) + '</div>';
                html += maturityHtml;
                html += '<div style="font-size:0.72rem;color:#666">F:' + Math.round(run.f_score) + ' A:' + Math.round(run.a_score) + ' I:' + Math.round(run.i_score) + ' R:' + Math.round(run.r_score) + '</div>';
                html += '</div>';
                html += '<div class="run-actions no-print" onclick="event.stopPropagation()">';
                html += '<button type="button" class="btn-sm btn-sm-secondary" onclick="exportJSON(' + run.id + ')">JSON</button>';
                html += '<button type="button" class="btn-sm btn-sm-fip" onclick="exportRunTurtle(' + run.id + ')">FIP</button>';
                html += '<button type="button" class="btn-sm btn-sm-danger" onclick="deleteRun(' + run.id + ')">Delete</button>';
                html += '</div></div></div>';
                html += '<div class="run-details" id="run-details-' + run.id + '">' + renderRunDetails(run) + '</div>';
                html += '</div>';
            });

            html += '</div>';
        });

        container.innerHTML = html;

        setTimeout(function() {
            Object.keys(groupedData).forEach(function(doi) {
                var runs = groupedData[doi];
                if (runs.length <= 1) return;
                var safeId = doi.replace(/[^a-z0-9]/gi, '_');
                var canvas = document.getElementById('chart-' + safeId);
                if (!canvas) return;
                var sorted = runs.slice().reverse();
                new Chart(canvas, {
                    type: 'line',
                    data: {
                        labels: sorted.map(function(r, i) { return 'Run ' + (i + 1); }),
                        datasets: [
                            {
                                label: 'Overall Score',
                                data: sorted.map(function(r) { return r.overall_score; }),
                                borderColor: '#1a73e8',
                                backgroundColor: 'rgba(26,115,232,0.15)',
                                borderWidth: 2.5,
                                pointRadius: 5,
                                pointBackgroundColor: '#1a73e8',
                                tension: 0.3,
                                fill: true
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 12, padding: 8 } },
                            title: { display: true, text: 'Score Trend Over Runs', font: { size: 12 }, color: '#444' }
                        },
                        scales: {
                            y: { min: 0, max: 100, ticks: { font: { size: 10 }, callback: function(val) { return val + '%'; } }, grid: { color: 'rgba(0,0,0,0.05)' } },
                            x: { ticks: { font: { size: 10 } }, grid: { display: false } }
                        }
                    }
                });
            });
        }, 50);

    } catch(e) {
        container.innerHTML = '<div class="error">No history found: ' + e.message + '</div>';
    }
}

function renderRunDetails(run) {
    if (!run.results) return '<p style="color:#666;font-size:0.875rem">No details available.</p>';

    var html = '';

    if (run.maturity_level) {
        var mc = getMaturityColor(run.maturity_level);
        var mb = getMaturityBg(run.maturity_level);
        html += '<div style="margin-bottom:0.75rem;padding:0.6rem 0.75rem;border-radius:6px;border-left:4px solid ' + mc + ';background:' + mb + '">';
        html += '<div style="font-size:0.75rem;color:#666">Maturity Level</div>';
        html += '<div style="font-weight:700;color:' + mc + '">' + run.maturity_level + '</div>';
        html += '<div style="font-size:0.75rem;color:#555;margin-top:2px">' + (run.maturity_description || '') + '</div>';
        html += '</div>';
    }

    var snap = run.profile_snapshot;
    if (snap && snap.name) {
        html += '<div style="margin-bottom:0.75rem;padding:0.6rem 0.75rem;background:#f8f9fa;border-radius:6px;font-size:0.8rem">';
        html += '<div style="font-weight:600;margin-bottom:0.35rem;color:#444">Profile used: ' + snap.name + '</div>';
        html += '<div style="color:#666">Identifiers: ' + (snap.accepted_identifiers || []).join(', ') + '</div>';
        html += '<div style="color:#666">Formats: ' + (snap.accepted_formats || []).join(', ') + '</div>';
        html += '<div style="color:#666">Required fields: ' + (snap.required_metadata_fields || []).join(', ') + '</div>';
        if (snap.required_vocabulary) html += '<div style="color:#666">Vocabulary: ' + snap.required_vocabulary + '</div>';
        if (snap.community_standard) html += '<div style="color:#666">Community standard: ' + snap.community_standard + '</div>';
        html += '</div>';
    }

    html += '<div class="mini-scores">';
    html += '<div class="mini-score overall"><div class="label">Overall</div><div class="value">' + formatScore(run.overall_score) + '</div></div>';
    html += '<div class="mini-score f"><div class="label">Findable</div><div class="value">' + formatScore(run.f_score) + '</div></div>';
    html += '<div class="mini-score a"><div class="label">Accessible</div><div class="value">' + formatScore(run.a_score) + '</div></div>';
    html += '<div class="mini-score i"><div class="label">Interoperable</div><div class="value">' + formatScore(run.i_score) + '</div></div>';
    html += '<div class="mini-score r"><div class="label">Reusable</div><div class="value">' + formatScore(run.r_score) + '</div></div>';
    html += '</div>';

    run.results.forEach(function(r) {
        html += '<div class="metric-mini"><div class="dot ' + r.status + '"></div>';
        html += '<div><div class="mid-text"><strong>' + r.metric_id + '</strong> &mdash; ' + r.description;
        html += ' <span style="font-size:0.7rem;color:#888">(' + r.priority + ')</span></div>';
        if (r.evidence) html += '<div style="font-size:0.75rem;color:#555;margin-top:2px">&#10003; ' + r.evidence + '</div>';
        if (r.recommendation) html += '<div class="rec">&rarr; ' + r.recommendation + '</div>';
        html += '</div></div>';
    });

    var recs = run.results.filter(function(r) { return r.recommendation; });
    if (recs.length > 0) {
        html += '<div style="margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid #e0e0e0">';
        html += '<div style="font-size:0.8rem;font-weight:600;margin-bottom:0.5rem">Recommendations:</div>';
        recs.forEach(function(r) {
            html += '<div style="font-size:0.8rem;color:#d93025;margin-bottom:0.25rem">&middot; ' + r.recommendation + '</div>';
        });
        html += '</div>';
    }

    return html;
}

function toggleRun(id) {
    var details = document.getElementById('run-details-' + id);
    var header = document.getElementById('run-header-' + id);
    var isOpen = details.classList.contains('show');
    document.querySelectorAll('.run-details').forEach(function(d) { d.classList.remove('show'); });
    document.querySelectorAll('.run-header').forEach(function(h) { h.classList.remove('expanded'); });
    if (!isOpen) {
        details.classList.add('show');
        header.classList.add('expanded');
        expandedRunId = id;
    } else {
        expandedRunId = null;
    }
}

async function deleteRun(id) {
    if (!confirm('Delete this assessment run? This cannot be undone.')) return;
    try {
        await apiFetch('/history/run/' + id, { method: 'DELETE' });
        loadHistory();
    } catch(e) {
        alert('Delete failed: ' + e.message);
    }
}

function exportJSON(id) {
    var run = allHistory.find(function(h) { return h.id === id; });
    if (!run) return;
    var blob = new Blob([JSON.stringify(run, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'fair-run-' + id + '-' + run.doi.replace(/\//g, '-') + '.json';
    a.click();
}

function exportRunTurtle(id) {
    var run = allHistory.find(function(h) { return h.id === id; });
    if (!run || !run.profile_snapshot || !run.profile_snapshot.name) {
        alert('No profile snapshot available for this run.');
        return;
    }
    var snap = run.profile_snapshot;
    fetch(API + '/profiles/' + encodeURIComponent(snap.name) + '/export/turtle')
        .then(function(r) { return r.blob(); })
        .then(function(blob) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = snap.name.replace(/ /g, '_') + '_Run' + id + '_FIP.ttl';
            a.click();
        })
        .catch(function(e) { alert('Export failed: ' + e.message); });
}

async function exportAllJSON(doi) {
    try {
        var history = await apiFetch('/history/' + encodeURIComponent(doi));
        var blob = new Blob([JSON.stringify(history, null, 2)], { type: 'application/json' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'fair-history-' + doi.replace(/\//g, '-') + '.json';
        a.click();
    } catch(e) {
        alert('Export failed: ' + e.message);
    }
}

function runNew(doi) {
    localStorage.setItem('prefillDoi', doi);
    window.location.href = 'assess.html';
}

loadHistory();
</script>
</body>
</html>
